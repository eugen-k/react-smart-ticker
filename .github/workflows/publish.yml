name: Publish to npm

on:
  release:
    types: [released]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile # Ensures reproducible builds

      - name: Build
        run: yarn build

      - name: Login to npm
        uses: npm/cli-login@v1
        with:
          registry: https://registry.npmjs.org
          oidc: true

      - name: Publish
        # --access public is mandatory for scoped packages, safe for others
        # --provenance links the build to your GitHub Action for security
        run: npm publish --access public --provenance
